<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Chronicle Master v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050505; 
            color: #d1d5db; 
            font-family: 'Inter', sans-serif; 
        }
        
        .panel-glass { 
            background: rgba(15, 15, 15, 0.8); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1.25rem;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .btn-action {
            background: #dc2626;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-action:hover:not(:disabled) {
            background: #ef4444;
            transform: scale(1.02);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050505; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #dc2626; }

        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .processing-pulse { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-white/5 pb-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-red-600/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"></path><path d="M4 4a16 16 0 0 1 16 16"></path><circle cx="5" cy="19" r="1"></circle></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight uppercase italic">Chronicle <span class="text-red-600 font-black">Master v2</span></h1>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Analisi Batch Avanzata e Memoria Visiva</p>
                </div>
            </div>

            <div class="flex items-center gap-3 bg-zinc-900/40 p-2 rounded-xl border border-white/5">
                <div class="px-3 border-r border-white/5">
                    <label class="block text-[9px] font-black text-zinc-500 uppercase mb-1">Start</label>
                    <input type="number" id="startSec" value="0" class="bg-transparent text-white font-bold w-12 text-center outline-none">
                </div>
                <div class="px-3">
                    <label class="block text-[9px] font-black text-red-500 uppercase mb-1">Analizza (Sec)</label>
                    <input type="number" id="rangeSec" value="300" class="bg-transparent text-white font-bold w-16 text-center outline-none">
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Sidebar -->
            <div class="lg:col-span-4 space-y-6">
                <div class="panel-glass p-3">
                    <div id="dropZone" onclick="document.getElementById('videoInput').click()" class="aspect-video bg-black/60 border-2 border-dashed border-zinc-800 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:border-red-600/30 transition-all">
                        <span id="videoStatus" class="text-[10px] font-black text-zinc-600 uppercase">Seleziona Video</span>
                        <input type="file" id="videoInput" accept="video/*" class="hidden">
                    </div>
                    <video id="player" class="hidden w-full mt-3 rounded-lg shadow-2xl"></video>
                </div>

                <div class="panel-glass p-5 space-y-4">
                    <h3 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Configurazione Cast</h3>
                    <textarea id="castInput" placeholder="Bonnie, Chica, Michael, William, Clara..." class="w-full h-20 bg-black/40 border border-white/5 rounded-xl p-3 text-xs outline-none focus:border-red-600/40 transition-all resize-none font-medium">Bonnie, Chica, Michael, William, Clara</textarea>
                    
                    <div class="pt-2 space-y-3">
                        <button id="runBtn" disabled class="w-full py-4 btn-action text-white font-black text-xs uppercase tracking-widest rounded-xl shadow-lg shadow-red-900/10 disabled:opacity-20">
                            Avvia Processo Completo
                        </button>
                        <button id="summaryBtn" class="w-full py-3 bg-zinc-800/50 text-zinc-400 font-bold text-[10px] uppercase rounded-xl hover:text-white border border-white/5 transition-all">
                            Sintesi Narrativa Finale
                        </button>
                    </div>
                </div>

                <div id="progressCont" class="hidden panel-glass p-5 space-y-3">
                    <div class="flex justify-between items-center text-[10px] font-black uppercase">
                        <span id="statusLabel" class="text-zinc-500">In attesa</span>
                        <span id="progressPct" class="text-red-500">0%</span>
                    </div>
                    <div class="h-1.5 bg-black rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-red-600 w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>

            <!-- Output -->
            <div class="lg:col-span-8 panel-glass flex flex-col h-[75vh] overflow-hidden">
                <div class="p-5 border-b border-white/5 flex justify-between items-center bg-black/10">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Archivio Dialoghi</span>
                    </div>
                    <button onclick="copyToClipboard()" class="text-[9px] font-black bg-zinc-800 px-3 py-1.5 rounded hover:bg-zinc-700">COPIA</button>
                </div>
                <div id="output" class="p-8 overflow-y-auto custom-scrollbar flex-grow space-y-8">
                    <div id="idleState" class="flex flex-col items-center justify-center h-full text-zinc-600 text-center">
                        <p class="text-xs font-bold uppercase tracking-widest">Nessun dato elaborato</p>
                        <p class="text-[10px] mt-2 opacity-50">I risultati appariranno solo al termine dell'analisi batch.</p>
                    </div>
                    <div id="textContainer" class="hidden mono text-[13px] leading-[1.8] text-zinc-300 whitespace-pre-wrap selection:bg-red-600/30"></div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="buffer" class="hidden"></canvas>

    <script>
        const apiKey = "";
        const videoInput = document.getElementById('videoInput');
        const player = document.getElementById('player');
        const runBtn = document.getElementById('runBtn');
        const summaryBtn = document.getElementById('summaryBtn');
        const output = document.getElementById('output');
        const textContainer = document.getElementById('textContainer');
        const idleState = document.getElementById('idleState');
        const canvas = document.getElementById('buffer');
        const ctx = canvas.getContext('2d');

        let accumulatedTranscript = "";
        let characterMemory = {}; // Per mantenere coerenza nomi/aspetto

        videoInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                player.src = URL.createObjectURL(file);
                player.classList.remove('hidden');
                document.getElementById('videoStatus').innerText = "VIDEO: " + file.name.toUpperCase();
                runBtn.disabled = false;
            }
        };

        async function safeFetch(payload) {
            let retries = 5;
            let delay = 1000;
            while (retries > 0) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error();
                    return await response.json();
                } catch (e) {
                    retries--;
                    if (retries === 0) throw e;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        async function processBlock(frames, cast, lastContext) {
            const systemPrompt = `Sei un trascrittore visivo per video Gacha. 
Analizza i fotogrammi e trascrivi i dialoghi visibili nei box sopra i personaggi.

REGOLE MANDATORIE:
1. CAST: Priorità assoluta ai nomi: [${cast}]. Associali correttamente.
2. NOMI IGNOTI: Se un personaggio non è nel cast, usa un nome descrittivo basato sull'aspetto (es. "RAGAZZA CAPELLI VIOLA") e NON cambiarlo mai più.
3. LOGICA SOCIALE: Deduci le identità dai dialoghi (es. "Mamma", "Papà", "Fratello").
4. ACCORPAMENTO: Se lo stesso personaggio parla in sequenza, scrivi tutto su una sola riga: "NOME: Frase 1. Frase 2.". 
5. SPAZIATURA: Una riga vuota ad ogni cambio di interlocutore.
6. CAPS LOCK: Mantieni il testo originale (se è CAPS, lascialo CAPS).
7. SCENE MUTE: Se non ci sono dialoghi, NON scrivere messaggi di sistema. Se c'è un cambiamento visivo netto (es. "Michael si arrabbia" o "Bonnie scompare"), scrivi una breve nota d'azione tra parentesi quadre. Ignora sfondi e oggetti statici.
8. NO RIPETIZIONI: Contesto precedente: "${lastContext}". Non ripetere battute già trascritte se appaiono nei nuovi frame.
9. FLUIDITÀ: L'output deve essere pulito, leggibile e privo di commenti dell'IA.`;

            const payload = {
                contents: [{
                    parts: [
                        { text: "Estrai i dialoghi e le azioni chiave di questi frame." },
                        ...frames.map(f => ({ inlineData: { mimeType: "image/jpeg", data: f.data } }))
                    ]
                }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            const data = await safeFetch(payload);
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        }

        runBtn.onclick = async () => {
            const start = parseFloat(document.getElementById('startSec').value);
            const range = parseFloat(document.getElementById('rangeSec').value);
            const end = Math.min(start + range, player.duration);
            const cast = document.getElementById('castInput').value;

            runBtn.disabled = true;
            document.getElementById('progressCont').classList.remove('hidden');
            idleState.classList.add('hidden');
            textContainer.classList.add('hidden');
            
            let tempOutput = "";
            let currentTime = start;
            const captureInterval = 1.25;
            const batchCount = 12; // Numero di frame per singola analisi

            while (currentTime < end) {
                let frames = [];
                document.getElementById('statusLabel').innerText = `Cattura: ${currentTime.toFixed(0)}s`;

                for (let i = 0; i < batchCount && currentTime < end; i++) {
                    player.currentTime = currentTime;
                    await new Promise(r => player.onseeked = r);
                    canvas.width = 1280; canvas.height = 720;
                    ctx.drawImage(player, 0, 0, 1280, 720);
                    frames.push({ data: canvas.toDataURL('image/jpeg', 0.5).split(',')[1] });
                    currentTime += captureInterval;
                    
                    const pct = Math.min(100, Math.round(((currentTime - start) / (end - start)) * 100));
                    document.getElementById('progressBar').style.width = pct + "%";
                    document.getElementById('progressPct').innerText = pct + "%";
                }

                document.getElementById('statusLabel').innerText = "Elaborazione IA...";
                const result = await processBlock(frames, cast, tempOutput.slice(-100));
                if (result.trim()) {
                    tempOutput += result + "\n\n";
                }
            }

            accumulatedTranscript += tempOutput;
            textContainer.innerText = accumulatedTranscript;
            textContainer.classList.remove('hidden');
            
            document.getElementById('statusLabel').innerText = "Fine Batch";
            document.getElementById('startSec').value = end.toFixed(1);
            runBtn.disabled = false;
            output.scrollTop = 0;
        };

        summaryBtn.onclick = async () => {
            if (!accumulatedTranscript) return;
            summaryBtn.disabled = true;
            
            const payload = {
                contents: [{ parts: [{ text: "Basandoti su questa trascrizione, scrivi un riassunto narrativo continuo e coinvolgente: \n\n" + accumulatedTranscript }] }],
                systemInstruction: { parts: [{ text: "Sei un narratore. Crea un racconto fluido della storia, focalizzandoti sull'evoluzione dei personaggi e dei conflitti." }] }
            };

            const data = await safeFetch(payload);
            const summary = data.candidates?.[0]?.content?.parts?.[0]?.text || "Errore riassunto.";
            
            const summaryDiv = document.createElement('div');
            summaryDiv.className = "mt-12 p-6 bg-zinc-900/50 border border-red-600/20 rounded-2xl";
            summaryDiv.innerHTML = `<h4 class="text-red-500 font-black uppercase text-[10px] mb-4 tracking-[0.2em]">Sintesi della Storia</h4><div class="text-zinc-400 italic text-sm">${summary}</div>`;
            textContainer.appendChild(summaryDiv);
            
            summaryBtn.disabled = false;
            output.scrollTop = output.scrollHeight;
        };

        function copyToClipboard() {
            const text = textContainer.innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        }
    </script>
</body>
</html>
